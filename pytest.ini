[pytest]
testpaths = tests
# `pythonpath = . src` adds BOTH the project root (so cross-test-directory
# imports like `from tests.stubs import ...` resolve regardless of how
# pytest is invoked -- default pytest rootdir auto-prepend already does
# this for `pytest` from project root, but `python -m pytest` from a
# subdirectory or non-default rootdir can miss it) AND `src/` (so
# `import uir_pipeline.*` works without PYTHONPATH overrides in CI).
pythonpath = . src
addopts = -ra --strict-markers --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    mps: marks tests that require Apple Silicon MPS (auto-skipped elsewhere)
    rocm: marks tests that require AMD ROCm (auto-skipped on non-AMD runners)
    tier3: marks Tier 3 image-awareness integration tests (Florence-2 + PyMuPDF)
