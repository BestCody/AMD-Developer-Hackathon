[pytest]
testpaths = tests
pythonpath = src
addopts = -ra --strict-markers --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    mps: marks tests that require Apple Silicon MPS (auto-skipped elsewhere)
    rocm: marks tests that require AMD ROCm (auto-skipped on non-AMD runners)
    tier3: marks Tier 3 image-awareness integration tests (Florence-2 + PyMuPDF)
