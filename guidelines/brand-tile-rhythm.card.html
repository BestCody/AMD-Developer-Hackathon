<!-- @dsCard group="Brand" viewport="700x260" subtitle="Light / parchment / dark tile rhythm — the section divider is the color change" name="Tile Rhythm" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;font-family:var(--font-text)}
  .tile{padding:28px 24px;text-align:center}
  h3{margin:0 0 4px;font-family:var(--font-display);font-size:22px;font-weight:600;letter-spacing:-0.01em}
  p{margin:0;font-size:13px}
</style></head><body>
<div class="tile" style="background:var(--surface-canvas);color:var(--text-ink)"><h3>Aperture</h3><p>Light tile — canvas</p></div>
<div class="tile" style="background:var(--surface-tile-1);color:var(--text-on-dark)"><h3>Aperture</h3><p style="color:var(--text-muted-on-dark)">Dark tile — surface-tile-1</p></div>
<div class="tile" style="background:var(--surface-parchment);color:var(--text-ink)"><h3>Aperture</h3><p>Parchment tile</p></div>
</body></html>
