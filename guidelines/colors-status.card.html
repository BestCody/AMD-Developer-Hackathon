<!-- @dsCard group="Colors" viewport="700x120" subtitle="Aperture addition — pipeline status states (not in Apple source)" name="Status" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:20px;font-family:var(--font-text);background:var(--surface-canvas);}
  .row{display:flex;gap:12px;}
  .chip{padding:8px 14px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;}
</style></head><body>
<div class="row">
  <div class="chip" style="background:var(--status-processing-bg);color:var(--status-processing)">Processing</div>
  <div class="chip" style="background:var(--status-success-bg);color:var(--status-success)">Complete</div>
  <div class="chip" style="background:var(--status-warning-bg);color:var(--status-warning)">Low confidence</div>
  <div class="chip" style="background:var(--status-error-bg);color:var(--status-error)">Failed</div>
</div>
</body></html>
