<!-- @dsCard group="Colors" viewport="700x130" subtitle="One near-black ink for all text — never pure black on copy" name="Text" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:20px;font-family:var(--font-text);background:var(--surface-canvas);}
  .row{display:flex;gap:24px;align-items:center;}
  .item{display:flex;flex-direction:column;gap:6px}
  .item div{font-size:18px;font-weight:600}
  .item small{font-size:11px;color:var(--text-muted-48)}
  .dark{background:var(--surface-tile-1);padding:14px 18px;border-radius:var(--radius-sm)}
</style></head><body>
<div class="row">
  <div class="item"><div style="color:var(--text-ink)">Ink Aa</div><small>--text-ink #1d1d1f</small></div>
  <div class="item"><div style="color:var(--text-muted-80)">Muted 80 Aa</div><small>--text-muted-80 #333</small></div>
  <div class="item"><div style="color:var(--text-muted-48)">Muted 48 Aa</div><small>--text-muted-48 #7a7a7a</small></div>
  <div class="dark"><div style="color:var(--text-on-dark)">On Dark Aa</div><small style="color:var(--text-muted-on-dark)">--text-muted-on-dark</small></div>
</div>
</body></html>
