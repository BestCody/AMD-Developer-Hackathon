<!-- @dsCard group="Colors" viewport="700x110" subtitle="Hairlines function as soft rings, not hard lines" name="Hairlines" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:20px;font-family:var(--font-text);background:var(--surface-parchment);}
  .row{display:flex;gap:16px;}
  .box{flex:1;height:60px;background:var(--surface-canvas);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted-48)}
</style></head><body>
<div class="row">
  <div class="box" style="border:1px solid var(--border-hairline)">--border-hairline</div>
  <div class="box" style="box-shadow:var(--shadow-ring)">--border-soft (ring)</div>
  <div class="box" style="border:1px solid var(--border-divider-soft)">--border-divider-soft</div>
</div>
</body></html>
