<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MonadLabs Console</title>
<link rel="icon" href="{{ url_for('static', filename='ds/assets/logo/aperture-mark.png') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='ds/styles.css') }}">

<!--
  React + Babel are loaded from a CDN and JSX is transpiled in the browser.
  That is a prototype-grade setup inherited from the design kit: it
  keeps this Python repo free of a Node toolchain, at the cost of a ~3 MB
  download and a transpile on every page load. If this ever ships beyond a
  LAN demo, precompile the JSX and drop these three tags.
-->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.462.0"></script>
<!-- Markdown rendering for chat: marked parses, DOMPurify sanitizes before
     dangerouslySetInnerHTML. No integrity hash (mirrors the Lucide tag) -- if
     this console ships beyond a LAN demo, vendor + pin these. -->
<script src="https://unpkg.com/marked@15.0.7/marked.min.js"></script>
<script src="https://unpkg.com/dompurify@3.2.5/dist/purify.min.js"></script>

<!-- Vendored design-system primitives (Button, Dialog, Tabs, Badge, ...).
     The bundle's `window.ApertureDesignSystem_0a9afd` global keeps its
     generated name on purpose: it is emitted by the design compiler in
     Frontend/, and renaming our copy would break the console the moment
     anyone regenerates it. Brand naming lives in the markup, not here. -->

<script src="{{ url_for('static', filename='ds/ds-primitives.js') }}"></script>
<!-- Plain-JS API client; no JSX, so no Babel pass. -->
<script src="{{ url_for('static', filename='console/api.js') }}"></script>

<style>
  /* Global UI scale. The Aperture tokens are sized for a marketing page
     (17px body, 34px headings); in a dense app console that reads oversized.
     `zoom` shrinks type, spacing, icons and the rail uniformly -- something
     no token override can do, since much of the layout is hardcoded px in
     JSX. Chromium-only, which is what this console targets. The legacy
     `zoom` property does not accept var(), so the factor is a literal; the
     full-height rule divides 100vh by the same 0.75 so the app still fills
     the screen after zoom instead of leaving a gap at the bottom. */
  html, body, #root { height: 100%; }
  body { margin: 0; background: var(--surface-canvas); zoom: 0.75; }
  .console { display: flex; height: calc(100vh / 0.75); }

  @keyframes ap-spin { to { transform: rotate(360deg); } }
  .ap-spin { animation: ap-spin 0.9s linear infinite; }

  @keyframes ap-badge-pop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.25); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .ap-badge-pop { animation: ap-badge-pop 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) both; }

  .ap-ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid transparent; }
  .ap-ring--1 { border-top-color: var(--accent-primary); animation: ap-spin 1.6s linear infinite; }
  .ap-ring--2 { inset: 12px; border-top-color: var(--accent-primary-on-dark); opacity: 0.6; animation: ap-spin 1.1s linear infinite reverse; }
  .ap-ring--3 { inset: 24px; border-top-color: var(--gray-150); animation: ap-spin 2.2s linear infinite; }

  .ap-file-delete { opacity: 0; transform: scale(0.85); transition: opacity var(--duration-fast) ease, transform var(--duration-fast) ease; }
  .ap-file-icon:hover .ap-file-delete { opacity: 1; transform: scale(1); }

  .ap-cite { font-variant-numeric: tabular-nums; }

  /* Rendered chat markdown. Apple design: one accent, SF Pro/Inter, mono code
     on the dark tile surface. No second colour, no decorative shadows. */
  .ap-md > *:first-child { margin-top: 0; }
  .ap-md > *:last-child { margin-bottom: 0; }
  .ap-md p { margin: 0 0 10px; line-height: var(--text-body-leading); }
  .ap-md h1, .ap-md h2, .ap-md h3 { font-family: var(--font-display); font-weight: 600; line-height: 1.2; margin: 14px 0 6px; }
  .ap-md h1 { font-size: 18px; } .ap-md h2 { font-size: 17px; } .ap-md h3 { font-size: 16px; }
  .ap-md ul, .ap-md ol { margin: 0 0 10px; padding-left: 20px; }
  .ap-md li { margin: 2px 0; }
  .ap-md a { color: var(--accent-primary); text-decoration: none; }
  .ap-md a:hover { text-decoration: underline; }
  .ap-md strong { font-weight: 600; }
  .ap-md code { font-family: var(--font-mono); font-size: 0.92em; background: var(--gray-100); padding: 1px 5px; border-radius: var(--radius-xs); }
  .ap-md pre { background: var(--surface-tile-1); color: var(--text-on-dark); padding: 12px 14px; border-radius: var(--radius-sm); overflow: auto; margin: 0 0 10px; }
  .ap-md pre code { background: transparent; padding: 0; color: inherit; font-size: var(--text-mono-size); }
  .ap-md blockquote { border-left: 3px solid var(--accent-primary); margin: 0 0 10px; padding: 2px 12px; color: var(--text-muted-80); }
  .ap-md table { border-collapse: collapse; margin: 0 0 10px; }
  .ap-md th, .ap-md td { border: 1px solid var(--border-hairline); padding: 6px 10px; text-align: left; }
  .ap-md hr { border: none; border-top: 1px solid var(--border-hairline); margin: 12px 0; }
</style>
</head>
<body>
<div id="root"></div>

<script>
  // Server-injected config. Keep this the only channel from Flask into the
  // SPA -- anything else invites template/JS coupling that breaks silently.
  window.MONADLABS_CONFIG = { maxUploadMb: {{ max_upload_mb | tojson }} };
</script>

<!-- LucideIcon must load before every component that uses it. -->
<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='console/LucideIcon.jsx') }}"></script>
<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='console/AuthScreens.jsx') }}"></script>
<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='console/IconRail.jsx') }}"></script>
<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='console/FileCard.jsx') }}"></script>
<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='console/FileTree.jsx') }}"></script>
<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='console/FileDetail.jsx') }}"></script>
<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='console/FileBrowser.jsx') }}"></script>
<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='console/Markdown.jsx') }}"></script>
<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='console/GlobalSearch.jsx') }}"></script>
<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='console/CopilotChat.jsx') }}"></script>
<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='console/ChatsPanel.jsx') }}"></script>
<script type="text/babel" data-presets="react" src="{{ url_for('static', filename='console/app.jsx') }}"></script>
</body>
</html>
