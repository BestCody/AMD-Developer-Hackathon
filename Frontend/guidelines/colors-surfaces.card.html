<!-- @dsCard group="Colors" viewport="700x150" subtitle="Alternating light/parchment/dark tile surfaces" name="Surfaces" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:20px;font-family:var(--font-text);background:var(--surface-canvas);}
  .row{display:flex;gap:10px;}
  .sw{flex:1;height:90px;border-radius:var(--radius-sm);display:flex;align-items:flex-end;padding:8px 10px;font-size:11px;border:1px solid var(--border-hairline)}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--surface-canvas);color:var(--text-ink)">Canvas</div>
  <div class="sw" style="background:var(--surface-parchment);color:var(--text-ink)">Parchment</div>
  <div class="sw" style="background:var(--surface-pearl);color:var(--text-ink)">Pearl</div>
  <div class="sw" style="background:var(--surface-tile-1);color:#fff;border:none">Tile 1</div>
  <div class="sw" style="background:var(--surface-tile-2);color:#fff;border:none">Tile 2</div>
  <div class="sw" style="background:var(--surface-tile-3);color:#fff;border:none">Tile 3</div>
  <div class="sw" style="background:var(--surface-black);color:#fff;border:none">Black</div>
</div>
</body></html>
